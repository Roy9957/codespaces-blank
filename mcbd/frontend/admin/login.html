<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Admin Portal — Minecraft Bangladesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&family=Press+Start+2P&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../static/css/base.css">
<link rel="stylesheet" href="../static/css/extend.css">
<script src="../static/js/api.js"></script>
<style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--black);
  background-image: radial-gradient(rgba(244,241,234,0.08) 1.5px, transparent 1.5px);
  background-size: 24px 24px;
  padding: 24px;
  position: relative;
  overflow-x: hidden;
}

.login-card {
  width: 100%;
  max-width: 440px;
  background: var(--cream);
  border: 5px solid var(--black);
  box-shadow: 12px 12px 0 var(--grass);
  padding: 36px 32px;
  position: relative;
  z-index: 10;
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.login-card:hover {
  box-shadow: 16px 16px 0 var(--gold);
}

.login-header {
  text-align: center;
  margin-bottom: 28px;
}
.login-logo {
  width: 64px;
  height: 64px;
  margin: 0 auto 16px;
  border: 3px solid var(--black);
  box-shadow: 4px 4px 0 var(--black);
  background: var(--black);
  overflow: hidden;
}
.login-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.login-header h1 {
  font-size: 24px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  color: var(--black);
  margin-bottom: 4px;
}
.login-header h1 span { color: var(--grass); }
.login-header p {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: #5a5040;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.form-field label {
  display: block;
  font-size: 11px;
  font-weight: 900;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  color: var(--black);
}
.form-field input {
  width: 100%;
  padding: 14px 16px;
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 700;
  background: var(--white);
  border: 3px solid var(--black);
  color: var(--black);
  outline: none;
  transition: box-shadow 0.15s ease, background 0.15s ease;
}
.form-field input:focus {
  box-shadow: 4px 4px 0 var(--grass);
  background: var(--white);
}

.login-btn {
  width: 100%;
  padding: 16px;
  background: var(--grass);
  color: var(--white);
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 4px solid var(--black);
  box-shadow: 5px 5px 0 var(--black);
  cursor: pointer;
  margin-top: 10px;
  transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
}
.login-btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: 8px 8px 0 var(--black);
  background: var(--gold);
  color: var(--black);
}
.login-btn:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 var(--black);
}
</style>
</head>
<body>

<div class="login-card">
  <div class="sticker sticker-grass float-item" style="top:-14px;right:-14px;">STAFF PORTAL</div>
  
  <div class="login-header">
    <div class="login-logo">
      <img src="/logo.png" alt="MCBD Logo" onerror="this.src='/logo.jpeg';">
    </div>
    <h1>MC<span>BD</span> ADMIN</h1>
    <p><i class="fas fa-shield-alt"></i> Staff Authentication</p>
  </div>

  <form id="loginForm" novalidate>
    <div class="form-field" style="margin-bottom:18px;">
      <label for="username"><i class="fas fa-user" style="margin-right:4px;"></i> Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin">
    </div>

    <div class="form-field" style="margin-bottom:24px;">
      <label for="password"><i class="fas fa-key" style="margin-right:4px;"></i> Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
    </div>

    <button type="submit" class="login-btn" id="loginBtn">LOG IN TO DASHBOARD</button>

    <div class="form-message" id="loginMessage"></div>
  </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('mcbd_admin_token')) {
    window.location.href = 'dashboard.html';
    return;
  }

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('loginBtn');
  const msg = document.getElementById('loginMessage');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) {
      msg.textContent = 'Please fill in both username and password.';
      msg.className = 'form-message show error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'LOGGING IN…';
    msg.classList.remove('show', 'error', 'success');

    try {
      const data = await apiPost('/auth/login', { username, password });
      localStorage.setItem('mcbd_admin_token', data.access_token);
      localStorage.setItem('mcbd_admin_name', data.display_name);
      localStorage.setItem('mcbd_admin_role', data.role);
      window.location.href = 'dashboard.html';
    } catch (err) {
      msg.textContent = err.message || 'Invalid username or password.';
      msg.className = 'form-message show error';
      btn.disabled = false;
      btn.textContent = 'LOG IN TO DASHBOARD';
    }
  });
});
</script>
</body>
</html>
