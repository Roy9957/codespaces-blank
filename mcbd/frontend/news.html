<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="description" content="Latest news, announcements, and events from Minecraft Bangladesh.">
<title>News &amp; Announcements — Minecraft Bangladesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&family=Press+Start+2P&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<link rel="stylesheet" href="static/css/base.css">
<link rel="stylesheet" href="static/css/extend.css">
<script src="static/js/api.js"></script>
<script src="static/js/shared.js"></script>

<style>
/* ── News Post Modal ── */
.news-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 17, 10, 0.82);
  z-index: 9000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.28s ease;
  backdrop-filter: blur(4px);
}
.news-modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.news-modal {
  background: var(--white);
  border: 4px solid var(--black);
  box-shadow: 12px 12px 0 var(--black);
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transform: translateY(32px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.news-modal-overlay.open .news-modal {
  transform: translateY(0) scale(1);
}
.news-modal-header {
  position: relative;
  min-height: 200px;
  background: var(--grass);
  border-bottom: 4px solid var(--black);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.news-modal-header img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}
.news-modal-header .modal-icon-fallback {
  font-size: 56px;
  color: var(--white);
  position: relative;
  z-index: 1;
}
.news-modal-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 36px; height: 36px;
  background: var(--black); color: var(--cream);
  border: 2px solid var(--cream);
  font-size: 18px; font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  transition: background 0.15s, color 0.15s;
  line-height: 1;
}
.news-modal-close:hover { background: var(--red); color: var(--white); }
.news-modal-pin {
  position: absolute; top: 12px; left: 12px;
  background: var(--gold); color: var(--black);
  border: 2px solid var(--black); font-size: 10px;
  font-weight: 900; font-family: var(--font-mono); padding: 4px 8px;
  box-shadow: 2px 2px 0 var(--black); z-index: 10;
}
.news-modal-body {
  padding: 28px 28px 32px;
  overflow-y: auto;
  flex: 1;
}
.news-modal-cat {
  font-size: 10px; font-weight: 900; font-family: var(--font-mono);
  text-transform: uppercase; letter-spacing: 0.12em;
  display: inline-block; padding: 4px 10px;
  background: var(--grass); color: var(--white);
  border: 2px solid var(--black); margin-bottom: 14px;
}
.news-modal-cat.event { background: var(--gold); color: var(--black); }
.news-modal-cat.update { background: var(--teal); color: var(--white); }
.news-modal-cat.contest { background: var(--red); color: var(--white); }
.news-modal-title {
  font-size: clamp(20px, 3.5vw, 28px);
  font-weight: 900; line-height: 1.2; margin-bottom: 12px;
  text-transform: uppercase;
}
.news-modal-date {
  font-size: 11px; font-weight: 800; font-family: var(--font-mono);
  color: rgba(0,0,0,0.45); margin-bottom: 20px;
  display: flex; align-items: center; gap: 6px;
}
.news-modal-content {
  font-size: 15px; line-height: 1.75; color: #3a3224;
  font-family: var(--font-body); white-space: pre-line;
}

/* ── Card clickable ── */
.news-card { cursor: pointer; }
.news-card:active { transform: translate(2px, 2px); box-shadow: 4px 4px 0 var(--black); }

@media (max-width: 600px) {
  .news-modal { max-height: 95vh; }
  .news-modal-body { padding: 20px 18px 24px; }
}
</style>
</head>
<body>

<div id="navbarMount"></div>

<header class="page-header">
  <span class="section-eyebrow">📰 THE NOTICE BOARD</span>
  <h1>News &amp; Announcements</h1>
  <p>Everything happening across the community — contests, server updates, and events, posted by our team.</p>
</header>

<section class="section">
  <div style="max-width:1200px;margin:0 auto;">
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;justify-content:center;" id="categoryFilters">
      <button class="mc-btn mc-btn--gold" data-cat="" style="font-size:11px;padding:8px 16px;">ALL POSTS</button>
      <button class="btn-outline" data-cat="announcement" style="font-size:11px;padding:8px 16px;"><i class="fas fa-bullhorn"></i> ANNOUNCEMENT</button>
      <button class="btn-outline" data-cat="event" style="font-size:11px;padding:8px 16px;"><i class="fas fa-calendar-star"></i> EVENT</button>
      <button class="btn-outline" data-cat="update" style="font-size:11px;padding:8px 16px;"><i class="fas fa-arrows-rotate"></i> UPDATE</button>
      <button class="btn-outline" data-cat="contest" style="font-size:11px;padding:8px 16px;"><i class="fas fa-trophy"></i> CONTEST</button>
    </div>

    <div id="newsState" class="data-state"><i class="fas fa-spinner fa-spin"></i> Loading news…</div>
    <div class="news-grid" id="newsGrid" style="display:none;"></div>
  </div>
</section>

<!-- ═══ NEWS POST MODAL ═══ -->
<div class="news-modal-overlay" id="newsModalOverlay" role="dialog" aria-modal="true" aria-labelledby="newsModalTitleEl">
  <div class="news-modal" id="newsModal">
    <div class="news-modal-header" id="newsModalHeader">
      <img src="" alt="" id="newsModalImg" style="display:none;">
      <div class="modal-icon-fallback" id="newsModalIcon"><i class="fas fa-newspaper"></i></div>
      <button class="news-modal-close" id="newsModalClose" aria-label="Close">&times;</button>
      <span class="news-modal-pin" id="newsModalPin" style="display:none;"><i class="fas fa-thumbtack"></i> PINNED</span>
    </div>
    <div class="news-modal-body">
      <span class="news-modal-cat" id="newsModalCat">ANNOUNCEMENT</span>
      <div class="news-modal-title" id="newsModalTitleEl">Post Title</div>
      <div class="news-modal-date" id="newsModalDate"><i class="far fa-clock"></i> just now</div>
      <div class="news-modal-content" id="newsModalContent"></div>
    </div>
  </div>
</div>

<div id="footerMount"></div>

<script>
const CAT_ICONS = {
  announcement: 'fa-solid fa-bullhorn',
  event:        'fa-solid fa-calendar-star',
  update:       'fa-solid fa-arrows-rotate',
  contest:      'fa-solid fa-trophy',
};

const CAT_COLORS = {
  announcement: 'var(--grass)',
  event:        'var(--gold)',
  update:       'var(--teal)',
  contest:      'var(--red)',
};

/* ── Load + render grid ── */
async function loadNews(category) {
  const stateEl = document.getElementById('newsState');
  const grid    = document.getElementById('newsGrid');
  stateEl.style.display = 'block';
  stateEl.classList.remove('is-error');
  stateEl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading news…';
  grid.style.display = 'none';

  try {
    const path  = category ? `/news?category=${encodeURIComponent(category)}` : '/news';
    const posts = await apiGet(path);
    if (!posts.length) {
      stateEl.innerHTML = '<i class="fas fa-circle-info"></i> No posts in this category yet.';
      return;
    }

    grid.innerHTML = posts.map(post => {
      const imageUrl    = post.image_url ? String(post.image_url).trim() : '';
      const iconClass   = post.cover_icon || CAT_ICONS[post.category] || 'fa-solid fa-newspaper';
      const safeTitle   = escapeHtml(post.title   || 'News update');
      const safeExcerpt = escapeHtml(post.excerpt || (post.body ? post.body.slice(0, 140) + (post.body.length > 140 ? '…' : '') : ''));

      const imageMarkup    = imageUrl
        ? `<img src="${escapeHtml(imageUrl)}" class="news-card-img" alt="${safeTitle}" loading="lazy"
               onerror="this.style.display='none'; this.parentElement.querySelector('.news-card-fallback').style.display='flex';">`
        : '';
      const fallbackMarkup = `<div class="news-card-fallback" style="display:${imageUrl ? 'none' : 'flex'}"><i class="${escapeHtml(iconClass)}"></i></div>`;

      // Encode all post data for the click handler
      const dataAttr = `data-post='${JSON.stringify({
        id:           post.id,
        title:        post.title        || '',
        excerpt:      post.excerpt      || '',
        body:         post.body         || '',
        category:     post.category     || '',
        cover_icon:   post.cover_icon   || '',
        image_url:    post.image_url    || '',
        is_pinned:    post.is_pinned    || false,
        published_at: post.published_at || '',
      }).replace(/'/g, '&#39;')}'`;

      return `
        <div class="news-card ${post.is_pinned ? 'is-pinned' : ''}" ${dataAttr} onclick="openNewsModal(this)" tabindex="0"
             onkeydown="if(event.key==='Enter'||event.key===' ')openNewsModal(this)" role="button"
             aria-label="Read: ${safeTitle}">
          <div class="news-card-icon">
            ${imageMarkup}
            ${fallbackMarkup}
            ${post.is_pinned ? '<span class="pin-flag"><i class="fas fa-thumbtack"></i> PINNED</span>' : ''}
          </div>
          <div class="news-card-body">
            <div class="news-card-cat">${escapeHtml(post.category)}</div>
            <h3>${safeTitle}</h3>
            <p>${safeExcerpt}</p>
            <div class="news-card-date"><i class="far fa-clock"></i> ${timeAgo(post.published_at)}</div>
          </div>
        </div>
      `;
    }).join('');

    stateEl.style.display = 'none';
    grid.style.display    = 'grid';
  } catch (err) {
    console.error(err);
    stateEl.classList.add('is-error');
    stateEl.innerHTML = '<i class="fas fa-triangle-exclamation"></i> Could not load news. Please try again shortly.';
  }
}

/* ── Open news popup ── */
window.openNewsModal = function(cardEl) {
  const raw  = cardEl.getAttribute('data-post');
  if (!raw) return;
  const post = JSON.parse(raw.replace(/&#39;/g, "'"));

  const overlay    = document.getElementById('newsModalOverlay');
  const imgEl      = document.getElementById('newsModalImg');
  const iconEl     = document.getElementById('newsModalIcon');
  const pinEl      = document.getElementById('newsModalPin');
  const catEl      = document.getElementById('newsModalCat');
  const titleEl    = document.getElementById('newsModalTitleEl');
  const dateEl     = document.getElementById('newsModalDate');
  const contentEl  = document.getElementById('newsModalContent');

  /* Header image / fallback icon */
  const imageUrl  = post.image_url ? String(post.image_url).trim() : '';
  const iconClass = post.cover_icon || CAT_ICONS[post.category] || 'fa-solid fa-newspaper';

  if (imageUrl) {
    imgEl.src = imageUrl;
    imgEl.style.display  = 'block';
    iconEl.style.display = 'none';
  } else {
    imgEl.style.display  = 'none';
    iconEl.innerHTML     = `<i class="${escapeHtml(iconClass)}"></i>`;
    iconEl.style.display = 'flex';
  }

  /* Header bg tint by category */
  const hdr = document.getElementById('newsModalHeader');
  hdr.style.background = CAT_COLORS[post.category] || 'var(--grass)';

  /* Pinned badge */
  pinEl.style.display = post.is_pinned ? 'block' : 'none';

  /* Category badge */
  catEl.textContent = post.category || 'NEWS';
  catEl.className   = `news-modal-cat ${post.category || ''}`;

  /* Title, date, body */
  titleEl.textContent   = post.title || 'News Update';
  dateEl.innerHTML      = `<i class="far fa-clock"></i> ${timeAgo(post.published_at)}`;
  contentEl.textContent = post.body || post.excerpt || 'No content available.';

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
};

/* ── Close modal ── */
function closeNewsModal() {
  const overlay = document.getElementById('newsModalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('DOMContentLoaded', () => {
  loadNews('');

  /* Category filter buttons */
  document.querySelectorAll('#categoryFilters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#categoryFilters button').forEach(b => b.className = 'btn-outline');
      btn.className = 'mc-btn mc-btn--gold';
      loadNews(btn.getAttribute('data-cat'));
    });
  });

  /* Close modal */
  document.getElementById('newsModalClose').addEventListener('click', closeNewsModal);
  document.getElementById('newsModalOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeNewsModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeNewsModal();
  });
});
</script>
</body>
</html>
