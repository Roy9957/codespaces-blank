<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<meta name="description" content="Check live availability, IPs and player counts for all Minecraft Bangladesh community servers.">
<title>Server Availability — Minecraft Bangladesh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&family=Space+Mono:wght@400;700&family=Press+Start+2P&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="static/css/base.css">
<link rel="stylesheet" href="static/css/extend.css">
<script src="static/js/api.js"></script>
<script src="static/js/shared.js"></script>
</head>
<body>

<div id="navbarMount"></div>

<header class="page-header">
  <span class="section-eyebrow">🗺 THE SERVER LIST</span>
  <h1>Server Availability</h1>
  <p>Live status, player counts, and connection details for every community server — updated by our admin team.</p>
</header>

<section class="section">
  <div style="max-width:1200px;margin:0 auto;">
    <!-- Server Category Filter Buttons -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;justify-content:center;" id="serverFilters">
      <button class="mc-btn mc-btn--gold" data-type="all" style="font-size:11px;padding:8px 16px;">ALL SERVERS</button>
      <button class="btn-outline" data-type="survival" style="font-size:11px;padding:8px 16px;"><i class="fas fa-shovel"></i> SURVIVAL</button>
      <button class="btn-outline" data-type="creative" style="font-size:11px;padding:8px 16px;"><i class="fas fa-palette"></i> CREATIVE</button>
      <button class="btn-outline" data-type="redstone" style="font-size:11px;padding:8px 16px;"><i class="fas fa-bolt"></i> REDSTONE</button>
      <button class="btn-outline" data-type="minigame" style="font-size:11px;padding:8px 16px;"><i class="fas fa-gamepad"></i> MINIGAMES</button>
      <button class="btn-outline" data-type="pvp" style="font-size:11px;padding:8px 16px;"><i class="fas fa-crosshairs"></i> PVP</button>
    </div>

    <div id="serversState" class="data-state"><i class="fas fa-spinner fa-spin"></i> Checking server status…</div>
    <div class="server-grid" id="serversGrid" style="display:none;"></div>
  </div>
</section>

<div id="footerMount"></div>

<script>
let allServers = [];

const TYPE_ICONS = {
  survival: 'fa-solid fa-shovel',
  creative: 'fa-solid fa-palette',
  redstone: 'fa-solid fa-bolt',
  minigame: 'fa-solid fa-gamepad',
  pvp: 'fa-solid fa-crosshairs',
};

function copyIp(ip, btn) {
  navigator.clipboard.writeText(ip).then(() => {
    showToast(`IP ${ip} copied to clipboard!`);
    const original = btn.textContent;
    btn.textContent = 'COPIED!';
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function renderServers(servers) {
  const grid = document.getElementById('serversGrid');
  if (!servers.length) {
    grid.innerHTML = '<div style="text-align:center;grid-column:1/-1;padding:40px;font-weight:800;font-size:16px;">No servers found for this category.</div>';
    return;
  }

  grid.innerHTML = servers.map(s => {
    const pct = s.players_max > 0 ? Math.min(100, Math.round((s.players_online / s.players_max) * 100)) : 0;
    const icon = TYPE_ICONS[s.server_type] || 'fa-solid fa-server';
    const fullIp = s.ip_address ? (s.port && s.port !== 25565 ? `${s.ip_address}:${s.port}` : s.ip_address) : 'N/A';
    return `
      <div class="server-card ${s.is_featured ? 'is-featured' : ''}">
        <div>
          <div class="server-card-top">
            <h3><i class="${icon}" style="margin-right:8px;color:var(--red);"></i>${escapeHtml(s.name)}</h3>
            <span class="server-status-pill ${escapeHtml(s.status)}"><span class="dot-pulse"></span>${escapeHtml(s.status)}</span>
          </div>
          ${s.description ? `<p class="desc">${escapeHtml(s.description)}</p>` : ''}
          <div class="server-meta-row">
            <span class="server-tag"><i class="fas fa-desktop"></i> ${escapeHtml(s.edition.toUpperCase())}</span>
            <span class="server-tag"><i class="fas fa-tag"></i> ${escapeHtml(s.server_type)}</span>
            ${s.is_whitelisted ? '<span class="server-tag" style="background:var(--yellow);"><i class="fas fa-lock"></i> Whitelisted</span>' : ''}
          </div>
        </div>

        <div>
          <div class="server-pop-bar"><div class="server-pop-fill" style="width:${pct}%;"></div></div>
          <div class="server-pop-label">${s.players_online} / ${s.players_max} PLAYERS ONLINE (${pct}%)</div>
          <div class="server-ip-row">
            <span>${escapeHtml(fullIp)}</span>
            ${s.ip_address ? `<button onclick="copyIp('${escapeHtml(fullIp)}', this)">COPY IP</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function loadServers() {
  const stateEl = document.getElementById('serversState');
  const grid = document.getElementById('serversGrid');
  try {
    allServers = await apiGet('/servers');
    if (!allServers.length) {
      stateEl.innerHTML = '<i class="fas fa-circle-info"></i> No servers listed right now.';
      return;
    }
    stateEl.style.display = 'none';
    grid.style.display = 'grid';
    renderServers(allServers);
  } catch (err) {
    console.error(err);
    stateEl.classList.add('is-error');
    stateEl.innerHTML = '<i class="fas fa-triangle-exclamation"></i> Could not load server list. Please try again shortly.';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  loadServers();

  document.querySelectorAll('#serverFilters button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#serverFilters button').forEach(b => {
        b.className = 'btn-outline';
      });
      btn.className = 'mc-btn mc-btn--gold';
      const type = btn.getAttribute('data-type');
      if (type === 'all') {
        renderServers(allServers);
      } else {
        renderServers(allServers.filter(s => s.server_type === type));
      }
    });
  });
});
</script>
</body>
</html>
